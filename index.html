<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/CSS/root.css">
    <title>KeyVault | Manager</title>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">KEYVAULT</a>
            <nav>
                <a href="dashboard.html">My Keys</a>
                <a href="signin.html" class="btn" style="background: var(--accent); color: white;">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="hero" style="padding: 100px 0; text-align: center;">
                <h1 style="font-size: 4rem; font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; cursor: default;">
                    API Key Storage <br>
                    <span style="color: var(--accent);">For Developers.</span>
                </h1>
                <p style="max-width: 600px; margin: 0 auto 2.5rem auto; color: var(--text-dim); font-size: 1.2rem; cursor: default">
                    A secure, open-source vault to group your service keys. Login with GitHub, generate a hash, and never lose your credentials again.
                </p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <a href="signin.html" class="btn" style="background: var(--accent); color: white; text-decoration: none;">Get Started</a>
                    <button class="btn" style="background: transparent; color: white; border: 1px solid var(--border);">Documentation</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center;">
            <p>&copy; 2026 KeyVault Logic. No cookies, no tracking.</p>
        </div>
    </footer>

</body>
</html>
