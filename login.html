<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KEEVLT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <link rel="stylesheet" href="./assets/CSS/root.css">
    <link rel="stylesheet" href="./assets/CSS/login.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="container is-max-desktop">
                <div class="navbar-brand">
                    <a href="index.html" class="navbar-item has-text-weight-semibold">KEEVLT</a>
                </div>
                <div class="navbar-menu">
                    <div class="navbar-end">
                        <a class="navbar-item">My Keys</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="section login-hero">
            <div class="container is-max-desktop">
                <div class="columns is-centered">
                    <div class="column is-5-desktop is-6-tablet has-text-centered">

                        <h1 class="title is-2 mb-6">Welcome Back</h1>

                        <p class="subtitle is-6 mb-6">
                            Sign in to manage your encrypted service keys and maintain your developer vault.
                        </p>

                        <div class="login-box">
                            <button class="button is-large is-fullwidth github-btn" id="githubSignIn">
                                <span class="icon"><i class="ri-github-fill"></i></span>
                                <span>Sign in with GitHub</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container is-max-desktop has-text-centered">
            <p class="has-text-weight-semibold">KEEVLT</p>
            <p class="is-size-7">© 2026 KEEVLT. All rights reserved.</p>
        </div>
    </footer>

    <script src="./assets/JS/script.js" type="module"></script>
    <script src="./assets/JS/login.js" type="module" defer></script>

</body>

</html>
