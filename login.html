<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cyphr</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <link rel="stylesheet" href="./assets/CSS/root.css">
    <link rel="stylesheet" href="./assets/CSS/login.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="container is-max-desktop">
                <div class="navbar-brand">
                    <a id="brand-name" class="navbar-item has-text-weight-bold" href="/">CYPHR</a>
                </div>
                <div class="navbar-menu">
                    <div class="navbar-end">
                        <a class="navbar-item" href="dashboard.html">My Keys</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="section login-hero">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-4-desktop is-6-tablet">

                        <div class="has-text-centered mb-6">
                            <a href="/" class="is-size-7 is-uppercase has-text-grey" style="letter-spacing: 2px;">
                                <i class="ri-arrow-left-line"></i> Back to Home
                            </a>
                            <h1 class="title is-2 mt-4">Welcome Back</h1>
                            <p class="subtitle is-6">
                                Secure access to your encrypted vault.
                            </p>
                        </div>

                        <div class="login-box">
                            <button class="button is-medium is-fullwidth github-btn" id="githubSignIn">
                                <span class="icon"><i class="ri-github-fill"></i></span>
                                <span>Continue with GitHub</span>
                            </button>

                            <p class="is-size-7 has-text-centered mt-5 has-text-grey">
                                By signing in, you agree to our terms of service and privacy policy.
                            </p>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container is-max-desktop has-text-centered">
            <p class="has-text-weight-semibold">CYPHR</p>
            <p class="is-size-7">© 2026 CYPHR. All rights reserved.</p>
        </div>
    </footer>

    <script src="./assets/JS/script.js" type="module"></script>
    <script src="./assets/JS/login.js" type="module" defer></script>

</body>

</html>
