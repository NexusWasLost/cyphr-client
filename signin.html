<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/CSS/root.css">
    <title>Sign In | KeyVault</title>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">KEYVAULT</a>
        </div>
    </header>

    <main>
        <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
            <div style="background: var(--panel); border: 1px solid var(--border); padding: 3rem; border-radius: 16px; text-align: center; width: 100%; max-width: 400px;">
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Welcome Back</h1>
                <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem;">Sign in to manage your API vault.</p>

                <button class="btn" id="githubSignIn" style="width: 100%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    Sign in with GitHub
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center;">
            <p>&copy; 2026 KeyVault Logic</p>
        </div>
    </footer>

</body>
</html>
